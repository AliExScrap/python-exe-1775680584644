name: Build Python EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }
          pip install pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --onefile --name "n8n_Launcher" main.py
          if (-not (Test-Path "dist/n8n_Launcher.exe")) {
            throw "EXE non généré"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: n8n_Launcher-windows
          path: dist/n8n_Launcher.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: dist/n8n_Launcher.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}